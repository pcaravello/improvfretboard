<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e;
    if (!window.matchMedia('(display-mode: standalone)').matches)
      document.getElementById('install-banner').classList.add('visible');
  });
  function installPWA() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      document.getElementById('install-banner').classList.remove('visible');
    });
  }
  window.addEventListener('appinstalled', () => {
    document.getElementById('install-banner').classList.remove('visible');
  });
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !isStandalone) setTimeout(() => { document.getElementById('ios-hint').classList.add('visible'); }, 3000);
  const { useState, useMemo, useRef } = React;
</script>

// ── IndexedDB persistence ────────────────────────────────────────────────
const DB_NAME    = 'fretboard-songs';
const STORE_NAME = 'user-songs';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' });
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror   = e => reject(e.target.error);
  });
}

async function idbSaveSong(id, data) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx    = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.put({ id, data });
    tx.oncomplete = () => res(true);
    tx.onerror    = e  => rej(e.target.error);
  });
}

async function idbDeleteSong(id) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx    = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    store.delete(id);
    tx.oncomplete = () => res(true);
    tx.onerror    = e  => rej(e.target.error);
  });
}

async function idbLoadAll() {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx    = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const req   = store.getAll();
    req.onsuccess = e => res(e.target.result || []);
    req.onerror   = e => rej(e.target.error);
  });
}

// ── Voicing diagram ──────────────────────────────────────────────────────
const VoicingDot = ({ voicing, color, T }) => {
  if (!voicing) return null;
  const frets = voicing.split("").map(c => c==='x'?-1:parseInt(c));
  const played = frets.filter(f=>f>0);
  if (!played.length) return null;
  const minF = Math.min(...played), maxF = Math.max(...played);
  const span = Math.max(maxF - minF + 1, 4);
  const cellW=13, cellH=13;
  const w=6*cellW+10, h=span*cellH+18;
  return (
    <svg width={w} height={h} style={{display:"block",margin:"0 auto"}}>
      {minF<=1 && <rect x={8} y={12} width={6*cellW} height={2} fill={T.nutCol} rx={1}/>}
      {Array.from({length:span+1},(_,row)=>(
        <line key={row} x1={8} y1={14+row*cellH} x2={8+6*cellW} y2={14+row*cellH}
          stroke={T.borderStrong} strokeWidth={1}/>
      ))}
      {frets.map((_,s)=>(
        <line key={s} x1={8+s*cellW+cellW/2} y1={14} x2={8+s*cellW+cellW/2} y2={14+span*cellH}
          stroke={T.stringCol} strokeWidth={[2.2,1.8,1.5,1.2,1,0.7][s]}/>
      ))}
      {frets.map((f,s)=>{
        if(f<0) return <text key={s} x={8+s*cellW+cellW/2} y={10} textAnchor="middle" fontSize={8} fill="#f87171">×</text>;
        if(f===0) return <circle key={s} cx={8+s*cellW+cellW/2} cy={10} r={3} fill="none" stroke={color} strokeWidth={1.5}/>;
        const row = f-minF;
        return <circle key={s} cx={8+s*cellW+cellW/2} cy={14+row*cellH+cellH/2} r={4.5} fill={color}/>;
      })}
      {minF>1 && <text x={2} y={14+cellH/2+4} fontSize={7} fill={T.textFaint}>{minF}</text>}
    </svg>
  );
};

function App() {
  const [data,      setData]     = useState(DEFAULT_SONGS.bhs);
  const [mainTab,   setMainTab]  = useState("fretboard");
  const [scaleTab,  setScaleTab] = useState("modes");
  const [selId,     setSelId]    = useState(DEFAULT_SONGS.bhs.modes[0].id);
  const [boxStart,  setBoxStart] = useState(0);
  const [showDeg,   setShowDeg]  = useState(false);
  const [jsonError, setJsonError]= useState(null);
  const [themeId,   setThemeId]  = useState("dark");
  const [userSongs, setUserSongs]= useState({});   // { id: songData } — loaded from IndexedDB
  const fileRef = useRef();

  const T  = THEMES[themeId];
  const ac = data.song.accentColor;

  // sync body class for scrollbar + banner theming
  React.useEffect(() => {
    document.body.className = themeId;
    try { localStorage.setItem('fb-theme', themeId); } catch(e){}
  }, [themeId]);

  // restore saved theme + load user songs from IndexedDB on startup
  React.useEffect(() => {
    try {
      const saved = localStorage.getItem('fb-theme');
      if (saved === 'light' || saved === 'dark') setThemeId(saved);
    } catch(e){}

    idbLoadAll().then(rows => {
      const map = {};
      rows.forEach(row => { map[row.id] = row.data; });
      setUserSongs(map);
    }).catch(() => {});
  }, []);

  // JSON loader — persists to IndexedDB
  const handleFile = e => {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed.schema?.startsWith("harmonic-analysis")) throw new Error("Schema non riconosciuto");
        // Use song title as stable key (slugified)
        const id = (parsed.song.title + '_' + parsed.song.artist)
          .toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/(^_|_$)/g,'');
        idbSaveSong(id, parsed)
          .then(() => setUserSongs(prev => ({...prev, [id]: parsed})))
          .catch(() => setUserSongs(prev => ({...prev, [id]: parsed})));
        setData(parsed); setMainTab("fretboard"); setScaleTab("modes");
        setSelId(parsed.modes[0]?.id??""); setBoxStart(0); setJsonError(null);
      } catch(err) { setJsonError("JSON non valido: " + err.message); }
    };
    r.readAsText(file); e.target.value="";
  };

  // Delete a user song from IDB and state
  const deleteUserSong = (id, e) => {
    e.stopPropagation();
    idbDeleteSong(id).catch(()=>{});
    setUserSongs(prev => {
      const next = {...prev};
      delete next[id];
      // if current song is being deleted, switch to first default
      if (data === prev[id]) {
        const firstDefault = DEFAULT_SONGS[Object.keys(DEFAULT_SONGS)[0]];
        setData(firstDefault);
        setSelId(firstDefault.modes[0]?.id ?? "");
        setBoxStart(0);
      }
      return next;
    });
  };

  // Fretboard logic
  const items = scaleTab==="modes" ? data.modes : data.arpeggios;
  const cur   = useMemo(()=>items.find(x=>x.id===selId)??items[0],[items,selId]);
  const pcs   = useMemo(()=>new Set(cur?.intervals.map(i=>(cur.rootPC+i)%12)??[]),[cur]);
  const pcDeg = useMemo(()=>{const m={};cur?.intervals.forEach(i=>{m[(cur.rootPC+i)%12]=i;});return m;},[cur]);
  const boxEnd = boxStart+4;
  const inBox  = f => f>=boxStart && f<=boxEnd;
  const rootFrets = s => Array.from({length:13},(_,f)=>f).filter(f=>cur&&pc(s,f)===cur.rootPC);
  const r6 = useMemo(()=>rootFrets(0),[cur]);
  const r5 = useMemo(()=>rootFrets(1).filter(f=>f>0),[cur]);
  const jumpTo = si => { const rf=si===0?r6:r5; const b=rf.find(f=>f<=9); if(b!==undefined)setBoxStart(Math.max(0,b-2)); };
  const noteLabel = p => showDeg ? (DEG_MAP[pcDeg[p]]??'') : NOTE_NM[p];
  const boxX1 = boxStart===0 ? OPEN_X-10 : BX+(boxStart-1)*FW;
  const boxX2 = BX+boxEnd*FW;

  // Button style factory — theme-aware
  const btn = (active, color, extra={}) => ({
    background: active ? `${color}22` : T.bgCard,
    border: `1px solid ${active ? color : T.borderMid}`,
    color:  active ? color : T.textMid,
    borderRadius:3, cursor:"pointer", fontFamily:"inherit",
    transition:"all 0.15s",
    ...extra
  });
  const btnGhost = (active, color, extra={}) => ({
    background: active ? `${color}18` : "transparent",
    border: `1px solid ${active ? color : T.borderMid}`,
    color:  active ? color : T.textFaint,
    borderRadius:3, cursor:"pointer", fontFamily:"inherit",
    ...extra
  });

  // ── Section chord row ──────────────────────────────────────────────────
  const SectionChordsRow = ({ section }) => (
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <div style={{fontSize:9,letterSpacing:3,textTransform:"uppercase",color:ac,fontWeight:700}}>{section.label}</div>
        {section.note && <div style={{fontSize:8,color:T.textFaint,fontStyle:"italic"}}>{section.note}</div>}
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
        {section.chords.map((cid,i)=>{
          const ch = data.chords.find(c=>c.id===cid); if(!ch) return null;
          return (
            <div key={i} style={{
              padding:"7px 11px",borderRadius:3,minWidth:54,textAlign:"center",
              background: ch.isAlien ? `${ac}15` : T.bgCardAlt,
              border:`1px solid ${ch.isAlien ? ac : T.borderFaint}`,
            }}>
              <div style={{fontSize:14,fontWeight:700,color: ch.isAlien ? ac : T.textPrimary}}>{ch.symbol}</div>
              <div style={{fontSize:8,color:T.textFaint,marginTop:2}}>{ch.degree}</div>
            </div>
          );
        })}
      </div>
    </div>
  );

  // ────────────────────────────────────────────────────────────────────────
  return (
    <div style={{
      background:T.bgPage, minHeight:"100vh", padding:"16px 10px 40px",
      fontFamily:"'Courier New',Courier,monospace", color:T.textSecondary,
      transition:"background 0.25s, color 0.25s",
    }}>

      {/* ── TOP BAR ──────────────────────────────────────────────────── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",
                   flexWrap:"wrap",gap:8,maxWidth:860,margin:"0 auto 16px"}}>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          {Object.entries(DEFAULT_SONGS).map(([key,s])=>{
            const active = data.song.title===s.song.title && data.song.artist===s.song.artist;
            return (
              <button key={key}
                onClick={()=>{setData(s);setScaleTab("modes");setSelId(s.modes[0]?.id??"");setBoxStart(0);setJsonError(null);}}
                style={{...btn(active,s.song.accentColor),padding:"5px 11px",fontSize:9,letterSpacing:1}}>
                {s.song.title}
              </button>
            );
          })}
          {/* ── User-saved songs from IndexedDB ── */}
          {Object.entries(userSongs).map(([id,s])=>{
            const active = data.song.title===s.song.title && data.song.artist===s.song.artist;
            const color  = s.song.accentColor ?? "#4a8a9a";
            return (
              <div key={id} style={{display:"flex",alignItems:"center",gap:0}}>
                <button
                  onClick={()=>{setData(s);setScaleTab("modes");setSelId(s.modes[0]?.id??"");setBoxStart(0);setJsonError(null);}}
                  style={{...btn(active,color),padding:"5px 11px",fontSize:9,letterSpacing:1,
                    borderRadius:"3px 0 0 3px",borderRight:"none"}}>
                  {s.song.title}
                </button>
                <button
                  onClick={(e)=>deleteUserSong(id,e)}
                  title="Rimuovi brano salvato"
                  style={{
                    background: active ? `${color}22` : T.bgCard,
                    border:`1px solid ${active ? color : T.borderMid}`,
                    borderLeft:"none",
                    color: active ? color : T.textGhost,
                    borderRadius:"0 3px 3px 0",
                    cursor:"pointer", padding:"5px 7px", fontSize:9,
                    lineHeight:1, transition:"all 0.15s",
                  }}>✕</button>
              </div>
            );
          })}
          <button onClick={()=>fileRef.current.click()}
            style={{...btn(false,"#4a8a9a"),padding:"5px 11px",fontSize:9,letterSpacing:1}}>
            + JSON
          </button>
          <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleFile}/>
        </div>
        {/* Right side: complexity + theme toggle */}
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:8,color:T.textGhost,letterSpacing:2}}>★</span>
            <Stars n={data.analysis.complexity} color={ac}/>
          </div>
          {/* ── THEME TOGGLE ── */}
          <button
            onClick={()=>setThemeId(t=>t==="dark"?"light":"dark")}
            title={themeId==="dark" ? "Passa alla modalità chiara" : "Passa alla modalità scura"}
            style={{
              background: themeId==="dark" ? "#1a2a3a" : "#d8e8f4",
              border:`1px solid ${themeId==="dark" ? "#2a4058" : "#8aaabf"}`,
              borderRadius:20, cursor:"pointer",
              padding:"4px 10px", display:"flex", alignItems:"center", gap:6,
              transition:"all 0.2s",
            }}>
            <span style={{fontSize:13}}>{themeId==="dark" ? "☀️" : "🌙"}</span>
            <span style={{fontSize:8,letterSpacing:1,color:themeId==="dark"?"#4a7a90":"#2a5a7a",fontFamily:"'Courier New',monospace"}}>
              {themeId==="dark" ? "LIGHT" : "DARK"}
            </span>
          </button>
        </div>
      </div>

      {/* ── SONG HEADER ──────────────────────────────────────────────── */}
      <div style={{textAlign:"center",maxWidth:860,margin:"0 auto 18px"}}>
        {jsonError && (
          <div style={{color:"#f87171",fontSize:10,marginBottom:8,padding:"6px 12px",
            border:"1px solid #f87171",borderRadius:3,display:"inline-block",background:`#f8717112`}}>{jsonError}</div>
        )}
        <div style={{fontSize:9,letterSpacing:5,color:T.textGhost,textTransform:"uppercase",marginBottom:4}}>
          {data.song.artist} · {data.song.album} · {data.song.year}
        </div>
        <div style={{fontSize:26,fontWeight:700,color:T.textPrimary,letterSpacing:2,marginBottom:4}}>
          {data.song.title}
        </div>
        <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:12,fontSize:8,color:T.textFaint,letterSpacing:2}}>
          <span>🎸 {data.song.tuning}</span>
          <span>♩ {data.song.timeSignature}</span>
          <span>⏱ {data.song.tempo}</span>
          {data.song.capo>0 && <span>CAPO {data.song.capo}</span>}
        </div>
        <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:8,marginTop:10}}>
          <span style={{fontSize:9,padding:"3px 12px",borderRadius:2,letterSpacing:1,
            border:`1px solid ${ac}`,color:ac,background:`${ac}15`}}>
            {data.analysis.tonicNote} · {data.analysis.primaryMode}
          </span>
          <span style={{fontSize:9,padding:"3px 12px",borderRadius:2,letterSpacing:1,
            border:"1px solid #f87171",color:"#f87171",background:"#f8717112"}}>
            ⚡ {data.analysis.alienChord}
          </span>
        </div>
      </div>

      {/* ── MAIN TABS ────────────────────────────────────────────────── */}
      <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:18}}>
        {[["fretboard","TASTIERA"],["chords","ACCORDI"],["analysis","ANALISI"]].map(([t,l])=>(
          <button key={t} onClick={()=>setMainTab(t)}
            style={{...btn(mainTab===t,ac),padding:"7px 18px",fontSize:10,letterSpacing:2,fontWeight:mainTab===t?700:400}}>
            {l}
          </button>
        ))}
      </div>

      {/* ══════════════════════════════════════════════════════════════════
          TAB: TASTIERA
      ══════════════════════════════════════════════════════════════════ */}
      {mainTab==="fretboard" && cur && (
        <div style={{maxWidth:860,margin:"0 auto"}}>

          {/* Scale/Arp subtabs */}
          <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:12}}>
            {[["modes","SCALE / MODI"],["arps","ARPEGGI"]].map(([t,l])=>(
              <button key={t}
                onClick={()=>{setScaleTab(t);setSelId((t==="modes"?data.modes:data.arpeggios)[0]?.id??"");setBoxStart(0);}}
                style={{...btn(scaleTab===t,ac),padding:"5px 16px",fontSize:9,letterSpacing:2}}>
                {l}
              </button>
            ))}
          </div>

          {/* Item pills */}
          <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:5,marginBottom:14}}>
            {items.map(it=>(
              <button key={it.id} onClick={()=>{setSelId(it.id);setBoxStart(0);}}
                style={{...btn(selId===it.id,it.color),padding:"6px 12px",minWidth:80,
                  display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                <span style={{fontWeight:700,fontSize:11}}>{it.label}</span>
                <span style={{fontSize:8,opacity:.75}}>{it.sub}</span>
              </button>
            ))}
          </div>

          {/* Tip banner */}
          {cur.tip && (
            <div style={{maxWidth:580,margin:"0 auto 12px",padding:"9px 14px",borderRadius:3,
              border:`1px solid ${cur.color}40`,background:`${cur.color}0c`,
              fontSize:9,color:T.textMid,textAlign:"center",letterSpacing:.5,lineHeight:1.7}}>
              💡 {cur.tip}
            </div>
          )}

          {/* ── FRETBOARD SVG ── */}
          <div style={{overflowX:"auto",marginBottom:8,
            background:T.bgCardAlt,borderRadius:6,
            border:`1px solid ${T.borderFaint}`,
            padding:"8px 0"}}>
            <svg width={SVG_W} height={SVG_H} style={{display:"block",margin:"0 auto"}}>

              {/* Fret numbers */}
              {Array.from({length:13},(_,f)=>(
                <text key={f} x={nX(f)} y={PT-20} textAnchor="middle"
                  fontSize={9} fill={inBox(f)?T.fretNumActive:T.fretNumIdle} fontFamily="inherit">{f}</text>
              ))}

              {/* Neck wood */}
              <rect x={BX} y={PT-SH*.45} width={12*FW} height={5*SH+SH*.9}
                fill={T.neckBg} rx={3}/>

              {/* Box highlight */}
              <rect x={boxX1} y={PT-SH*.45} width={boxX2-boxX1} height={5*SH+SH*.9}
                fill={cur.color} opacity={themeId==="dark"?.07:.12} rx={5}
                stroke={cur.color} strokeWidth={1.5} strokeOpacity={.45}/>

              {/* Frets */}
              {Array.from({length:12},(_,i)=>{
                const f=i+1, hi=f>boxStart&&f<=boxEnd;
                return <line key={f} x1={BX+f*FW} y1={PT-SH*.4} x2={BX+f*FW} y2={PT+5*SH-SH*.2}
                  stroke={hi?T.fretActive:T.fretCol} strokeWidth={hi?2:1}/>;
              })}

              {/* Nut */}
              <rect x={NUT_X} y={PT-SH*.45} width={NUT_W} height={5*SH+SH*.9} fill={T.nutCol} rx={2}/>

              {/* Position markers */}
              {[3,5,7,9].map(f=>(
                <circle key={f} cx={BX+(f-.5)*FW} cy={PT+5*SH+12} r={5} fill={T.markerCol}/>
              ))}
              <circle cx={BX+11.5*FW} cy={PT+5*SH+6}  r={5} fill={T.markerCol}/>
              <circle cx={BX+11.5*FW} cy={PT+5*SH+20} r={5} fill={T.markerCol}/>

              {/* Strings */}
              {[0,1,2,3,4,5].map(s=>(
                <line key={s} x1={OPEN_X-14} y1={sY(s)} x2={SVG_W-PR/2} y2={sY(s)}
                  stroke={T.stringCol} strokeWidth={[2.8,2.3,1.9,1.4,1.1,.8][s]} opacity={.75}/>
              ))}

              {/* String labels */}
              {STR_LBL.map((nm,s)=>(
                <text key={s} x={OPEN_X-20} y={sY(s)+4}
                  textAnchor="middle" fontSize={10} fill={T.strLabelCol} fontFamily="inherit" fontWeight="600">{nm}</text>
              ))}

              {/* Note dots */}
              {Array.from({length:13},(_,f)=>
                [0,1,2,3,4,5].map(s=>{
                  const p=pc(s,f);
                  if(!pcs.has(p)) return null;
                  const isRoot=p===cur.rootPC, inside=inBox(f);
                  const x=nX(f), y=sY(s), r=inside?15:6;
                  return (
                    <g key={`${s}-${f}`} opacity={inside?1:themeId==="dark"?.2:.15}>
                      <circle cx={x} cy={y} r={r}
                        fill={isRoot ? cur.color : inside ? `${cur.color}28` : "none"}
                        stroke={cur.color} strokeWidth={isRoot?2.5:1.5}/>
                      {inside && (
                        <text x={x} y={y+4} textAnchor="middle"
                          fontSize={9} fontWeight="bold" fontFamily="inherit"
                          fill={isRoot ? (themeId==="dark"?"#020912":"#ffffff") : cur.color}>
                          {noteLabel(p)}
                        </text>
                      )}
                    </g>
                  );
                })
              )}

              {/* Root string markers */}
              {r6.filter(f=>inBox(f)).map(f=>(
                <text key={`r6-${f}`} x={nX(f)} y={sY(0)+27}
                  textAnchor="middle" fontSize={7} fill={cur.color} opacity={.8} fontWeight="700">6ª</text>
              ))}
              {r5.filter(f=>inBox(f)).map(f=>(
                <text key={`r5-${f}`} x={nX(f)} y={sY(1)+27}
                  textAnchor="middle" fontSize={7} fill={cur.color} opacity={.8} fontWeight="700">5ª</text>
              ))}
            </svg>
          </div>

          {/* Box navigation */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:12,marginBottom:10}}>
            <button disabled={boxStart===0} onClick={()=>setBoxStart(s=>Math.max(0,s-1))}
              style={{...btn(false,ac),padding:"5px 16px",fontSize:16,opacity:boxStart===0?.3:1}}>◀</button>
            <span style={{fontSize:11,color:T.textFaint,minWidth:110,textAlign:"center",letterSpacing:2}}>
              TASTO {boxStart} – {boxEnd}
            </span>
            <button disabled={boxStart>=8} onClick={()=>setBoxStart(s=>Math.min(8,s+1))}
              style={{...btn(false,ac),padding:"5px 16px",fontSize:16,opacity:boxStart>=8?.3:1}}>▶</button>
          </div>

          {/* Jump-to-root */}
          <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",marginBottom:10}}>
            {[{si:0,label:"ROOT · 6ª",frets:r6},{si:1,label:"ROOT · 5ª",frets:r5}].map(({si,label,frets})=>(
              <button key={si} onClick={()=>jumpTo(si)}
                style={{...btn(false,cur.color),padding:"5px 12px",fontSize:9,letterSpacing:.5}}>
                ↓ {label}&nbsp;<span style={{opacity:.55}}>[{frets.join(", ")}]</span>
              </button>
            ))}
          </div>

          {/* Root in box badges */}
          <div style={{display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap",marginBottom:14,minHeight:22}}>
            {r6.filter(f=>inBox(f)).map(f=>(
              <span key={f} style={{fontSize:9,padding:"3px 10px",borderRadius:2,letterSpacing:1,
                border:`1px solid ${cur.color}`,color:cur.color,background:`${cur.color}15`,fontWeight:700}}>
                ROOT · 6ª · tasto {f}</span>
            ))}
            {r5.filter(f=>inBox(f)).map(f=>(
              <span key={f} style={{fontSize:9,padding:"3px 10px",borderRadius:2,letterSpacing:1,
                border:`1px solid ${cur.color}`,color:cur.color,background:`${cur.color}15`,fontWeight:700}}>
                ROOT · 5ª · tasto {f}</span>
            ))}
          </div>

          {/* Note/Degree toggle */}
          <div style={{display:"flex",justifyContent:"center",marginBottom:18}}>
            <button onClick={()=>setShowDeg(d=>!d)}
              style={{...btn(showDeg,ac),padding:"5px 18px",fontSize:9,letterSpacing:1}}>
              {showDeg ? "♩ MOSTRA NOTE" : "① MOSTRA GRADI"}
            </button>
          </div>

          {/* Interval formula */}
          <div style={{maxWidth:580,margin:"0 auto"}}>
            <div style={{fontSize:9,color:T.textGhost,textAlign:"center",letterSpacing:4,
              textTransform:"uppercase",marginBottom:10}}>formula · {cur.label}</div>
            <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:5}}>
              {cur.intervals.map((iv,i)=>{
                const p=(cur.rootPC+iv)%12, isR=iv===0;
                return (
                  <div key={i} style={{
                    display:"flex",flexDirection:"column",alignItems:"center",gap:2,
                    padding:"8px 11px",borderRadius:4,minWidth:46,
                    background: isR ? `${cur.color}20` : T.bgCard,
                    border:`1px solid ${isR ? cur.color : T.borderFaint}`,
                  }}>
                    <span style={{fontSize:8,color:T.textFaint}}>{DEG_MAP[iv]??`+${iv}`}</span>
                    <span style={{fontSize:15,fontWeight:700,color:isR?cur.color:T.textPrimary}}>{NOTE_NM[p]}</span>
                    <span style={{fontSize:7,color:T.textGhost}}>+{iv}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════════════════
          TAB: ACCORDI
      ══════════════════════════════════════════════════════════════════ */}
      {mainTab==="chords" && (
        <div style={{maxWidth:860,margin:"0 auto"}}>
          <div style={{marginBottom:24}}>
            {data.sections.map(sec=><SectionChordsRow key={sec.id} section={sec}/>)}
          </div>
          <div style={{fontSize:9,letterSpacing:4,color:T.textGhost,textTransform:"uppercase",marginBottom:14,textAlign:"center"}}>
            analisi accordo per accordo
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
            {data.chords
              .filter((c,i,arr)=>arr.findIndex(x=>x.rootPC===c.rootPC&&x.symbol===c.symbol)===i)
              .map(ch=>(
              <div key={ch.id} style={{
                padding:"14px",borderRadius:4,
                background: ch.isAlien ? `${ac}0e` : T.bgCard,
                border:`1px solid ${ch.isAlien ? ac : T.borderFaint}`,
                boxShadow: themeId==="light" ? "0 1px 4px rgba(0,0,0,.06)" : "none",
              }}>
                <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:22,fontWeight:700,color:ch.isAlien?ac:T.textPrimary}}>{ch.symbol}</span>
                  <span style={{fontSize:11,color:ch.isAlien?ac:T.textFaint,fontWeight:700}}>{ch.degree}</span>
                </div>
                <div style={{fontSize:8,color:T.textFaint,marginBottom:2,letterSpacing:.5}}>{ch.modalOrigin}</div>
                <div style={{fontSize:9,color:T.textMid,marginBottom:8,lineHeight:1.5}}>{ch.function}</div>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:13,fontWeight:700,color:ch.isAlien?ac:T.textSecondary}}>{ch.tetradFull}</span>
                  <div style={{display:"flex",gap:3}}>
                    {ch.tensions.map(t=>(
                      <span key={t} style={{fontSize:7,padding:"1px 5px",borderRadius:2,
                        border:`1px solid ${T.borderStrong}`,color:T.textFaint}}>{t}</span>
                    ))}
                  </div>
                </div>
                <VoicingDot voicing={ch.voicing} color={ch.isAlien?ac:T.textMid} T={T}/>
                <div style={{textAlign:"center",fontSize:8,color:T.textGhost,marginTop:4,letterSpacing:1}}>
                  {ch.voicing}
                </div>
                {ch.note && (
                  <div style={{fontSize:8,color:T.textDim,borderTop:`1px solid ${T.borderFaint}`,
                    paddingTop:6,lineHeight:1.5,fontStyle:"italic",marginTop:8}}>{ch.note}</div>
                )}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════════════════════════════
          TAB: ANALISI
      ══════════════════════════════════════════════════════════════════ */}
      {mainTab==="analysis" && (
        <div style={{maxWidth:700,margin:"0 auto"}}>
          <div style={{padding:"16px 20px",borderRadius:4,marginBottom:20,
            border:`1px solid ${ac}40`,background:`${ac}0c`,
            fontSize:11,color:T.textMid,lineHeight:1.8}}>
            {data.analysis.summary}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
            {[
              ["Centro tonale", data.analysis.tonicNote],
              ["Modo principale", data.analysis.primaryMode],
              ["Tecnica", data.analysis.technique],
              ["Movimento basso", data.analysis.bassMotion],
            ].map(([k,v])=>(
              <div key={k} style={{padding:"12px 14px",borderRadius:3,
                background:T.bgCard,border:`1px solid ${T.borderFaint}`,
                boxShadow: themeId==="light" ? "0 1px 4px rgba(0,0,0,.05)" : "none"}}>
                <div style={{fontSize:8,color:T.textGhost,letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{k}</div>
                <div style={{fontSize:10,color:T.textSecondary,lineHeight:1.5}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{padding:"14px 18px",borderRadius:4,marginBottom:20,
            border:"1px solid #f87171",background:"#f8717110"}}>
            <div style={{fontSize:8,color:"#f87171",letterSpacing:3,textTransform:"uppercase",marginBottom:6}}>
              ⚡ accordo alieno — {data.analysis.alienChord}
            </div>
            <div style={{fontSize:10,color:themeId==="dark"?"#c08080":"#8a3030",lineHeight:1.6}}>{data.analysis.alienReason}</div>
          </div>
          <div style={{fontSize:9,letterSpacing:4,color:T.textGhost,textTransform:"uppercase",marginBottom:12,textAlign:"center"}}>
            guida all'improvvisazione
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
            {Object.entries(data.improv).map(([secId,info])=>{
              const sec=data.sections.find(s=>s.id===secId);
              return (
                <div key={secId} style={{padding:"12px 14px",borderRadius:3,
                  background:T.bgCard,border:`1px solid ${T.borderFaint}`}}>
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:5}}>
                    <span style={{fontSize:9,color:ac,fontWeight:700,letterSpacing:1}}>
                      {sec?.label??secId.toUpperCase()}
                    </span>
                    <span style={{fontSize:9,color:T.textMid}}>▸ {info.primary}</span>
                    {info.secondary && (
                      <span style={{fontSize:8,color:T.textFaint,fontStyle:"italic"}}>alt: {info.secondary}</span>
                    )}
                  </div>
                  <div style={{fontSize:9,color:T.textDim,lineHeight:1.6}}>{info.tip}</div>
                </div>
              );
            })}
          </div>
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:8,letterSpacing:3,color:T.textGhost,textTransform:"uppercase",marginBottom:8}}>complessità armonica</div>
            <Stars n={data.analysis.complexity} color={ac}/>
            <div style={{fontSize:9,color:T.textFaint,marginTop:6}}>{data.analysis.complexity}/5</div>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",fontSize:7,color:T.textGhost,letterSpacing:2,marginTop:28}}>
        HARMONIC ANALYSIS TOOL · schema {data.schema}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
